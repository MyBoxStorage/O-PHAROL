<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fundo escuro -->
  <rect width="64" height="64" fill="#0D1838"/>

  <!-- Torre do farol (escalado e centralizado) -->
  <!-- Original viewBox: 0-163 x / 0-248 y → fator ~0.25, offset x+10 y+4 -->

  <!-- Corpo da torre -->
  <polygon points="14,60 50,60 44,22 20,22" fill="none" stroke="#F9F6F0" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- Listras diagonais internas (3 listras para legibilidade) -->
  <clipPath id="tc">
    <polygon points="14,60 50,60 44,22 20,22"/>
  </clipPath>
  <g clip-path="url(#tc)">
    <polygon points="6,60 14,60 54,10 46,10" fill="#C9A84C" opacity="0.55"/>
    <polygon points="20,60 28,60 68,10 60,10" fill="#C9A84C" opacity="0.55"/>
    <polygon points="34,60 42,60 82,10 74,10" fill="#C9A84C" opacity="0.55"/>
  </g>

  <!-- Plataforma intermediária -->
  <rect x="12" y="45" width="40" height="2.5" fill="#F9F6F0"/>

  <!-- Varanda superior -->
  <rect x="17" y="21" width="30" height="1.8" fill="#F9F6F0"/>

  <!-- Base -->
  <rect x="10" y="60" width="44" height="3" rx="1" fill="#F9F6F0"/>

  <!-- Cúpula de vidro -->
  <rect x="21" y="10" width="22" height="12" fill="none" stroke="#F9F6F0" stroke-width="1.2"/>
  <line x1="27" y1="10" x2="27" y2="22" stroke="#F9F6F0" stroke-width="0.8"/>
  <line x1="32" y1="10" x2="32" y2="22" stroke="#F9F6F0" stroke-width="0.8"/>
  <line x1="37" y1="10" x2="37" y2="22" stroke="#F9F6F0" stroke-width="0.8"/>

  <!-- Telhado / cone -->
  <polygon points="16,11 32,3 48,11" fill="#F9F6F0"/>

  <!-- Ponta/flag -->
  <line x1="32" y1="3" x2="32" y2="1" stroke="#C9A84C" stroke-width="1.5"/>
  <polygon points="32,1 38,0 32,-1" fill="#C9A84C"/>

  <!-- Luz (raios dourados pequenos) -->
  <g opacity="0.7">
    <line x1="32" y1="16" x2="32" y2="8"  stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="40" y1="18" x2="46" y2="13" stroke="#C9A84C" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="24" y1="18" x2="18" y2="13" stroke="#C9A84C" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="50" y1="16" x2="56" y2="16" stroke="#C9A84C" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="14" y1="16" x2="8"  y2="16" stroke="#C9A84C" stroke-width="0.9" stroke-linecap="round"/>
  </g>
</svg>
